name: R tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, R-${{ matrix.r-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        r-version: [release, devel]
        exclude:
          - os: macos-latest
            r-version: devel
    env:
      NOT_CRAN: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up R
        uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590
        with:
          r-version: ${{ matrix.r-version }}

      - name: Install dependencies (full lane)
        if: matrix.os == 'ubuntu-latest' && matrix.r-version == 'release'
        uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590
        with:
          extra-packages: |
            any::testthat
            any::shinytest2
            any::chromote
          needs: check
          pak-version: stable

      - name: Install dependencies (core lanes)
        if: matrix.os != 'ubuntu-latest' || matrix.r-version != 'release'
        uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590
        with:
          extra-packages: |
            any::testthat
          needs: check
          pak-version: stable

      - name: Run full testthat suite (incl shiny e2e)
        if: matrix.os == 'ubuntu-latest' && matrix.r-version == 'release'
        run: Rscript -e "testthat::test_dir('tests/testthat')"

      - name: Run core testthat suite (exclude shiny e2e)
        if: matrix.os != 'ubuntu-latest' || matrix.r-version != 'release'
        run: Rscript -e "files <- list.files('tests/testthat', pattern='^test-.*[.]R$', full.names = TRUE); files <- files[basename(files) != 'test-shinytest2-integration.R']; invisible(lapply(files, testthat::test_file))"
