name: R tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: r-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, R-release)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-15
          - macos-15-intel

    env:
      NOT_CRAN: "true"
      CI: "true"
      RGL_USE_NULL: "true"
      SHINYTEST2_TIMEOUT: "120000"
      SHINYTEST2_LOAD_TIMEOUT: "120000"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up R
        uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590
        with:
          extra-packages: |
            any::testthat
            any::shinytest2
            any::chromote
          needs: check
          pak-version: stable

      - name: Check test environment
        run: Rscript -e "cat('Operating system:', Sys.info()[['sysname']], '\n'); cat('Architecture:', Sys.info()[['machine']], '\n'); cat('R version:', R.version.string, '\n'); cat('Chrome executable:', chromote::find_chrome(), '\n')"

      - name: Run full testthat suite including shiny e2e
        run: Rscript -e "options(shinytest2.timeout = 120000, shinytest2.load_timeout = 120000, testthat.progress.max_fails = Inf); testthat::test_dir('tests/testthat', reporter = 'summary', stop_on_failure = TRUE, stop_on_warning = FALSE)"

  build:
    name: Build BIOSZEN_2.0.4
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up R
        uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590
        with:
          r-version: release
          use-public-rspm: true

      - name: Verify package version
        run: Rscript -e "description <- read.dcf('DESCRIPTION'); version <- unname(description[1, 'Version']); if (!identical(version, '2.0.4')) stop('Expected BIOSZEN version 2.0.4, found ', version)"

      - name: Build BIOSZEN source package
        run: |
          R CMD build .
          test -f BIOSZEN_2.0.4.tar.gz

      - name: Prepare universal bundle
        run: |
          mkdir -p dist/BIOSZEN_2.0.4
          cp BIOSZEN_2.0.4.tar.gz dist/BIOSZEN_2.0.4/
          cp inst/launchers/App.R dist/BIOSZEN_2.0.4/App.R
          cp Download_R_and_RStudio.html dist/BIOSZEN_2.0.4/
          cp README.md dist/BIOSZEN_2.0.4/

      - name: Validate bundle contents
        run: |
          test -f dist/BIOSZEN_2.0.4/App.R
          test -f dist/BIOSZEN_2.0.4/BIOSZEN_2.0.4.tar.gz
          test -f dist/BIOSZEN_2.0.4/Download_R_and_RStudio.html
          test -f dist/BIOSZEN_2.0.4/README.md

      - name: Upload BIOSZEN_2.0.4
        uses: actions/upload-artifact@v4
        with:
          name: BIOSZEN_2.0.4
          path: dist/BIOSZEN_2.0.4/
          if-no-files-found: error
          retention-days: 14
